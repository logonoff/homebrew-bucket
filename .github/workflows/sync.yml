name: Sync Manifests

on:
  repository_dispatch:
    types: [sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download manifests
        run: |
          jq -c '.[]' apps.json | while read -r entry; do
            url=$(echo "$entry" | jq -r '.pullFrom')
            dest=$(echo "$entry" | jq -r '.downloadTo')
            mkdir -p "$(dirname "$dest")"
            curl -fsSL "$url" -o "$dest"
            echo "Downloaded $url → $dest"
          done

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          UPDATES=$(git diff --name-only | while read -r file; do
            name=$(basename "${file%.*}")
            if [[ "$file" == *.rb ]]; then
              ver=$(grep -m1 'version "' "$file" | sed 's/.*version "\(.*\)"/\1/')
            elif [[ "$file" == *.json ]]; then
              ver=$(jq -r '.version' "$file")
            fi
            if [[ -n "$ver" ]]; then
              echo "$name to $ver"
            else
              echo "$name"
            fi
          done | paste -sd ', ' -)

          HEADLINE="chore: update $UPDATES"

          ADDITIONS=$(git diff --name-only | while read -r file; do
            content=$(base64 -w0 < "$file")
            printf '{"path":"%s","contents":"%s"}' "$file" "$content"
          done | jq -s '.')

          HEAD_OID=$(gh api graphql \
            -f query='{ repository(owner:"logonoff", name:"homebrew-bucket") {
              ref(qualifiedName:"refs/heads/main") { target { oid } }
            }}' --jq '.data.repository.ref.target.oid')

          jq -n \
            --arg oid "$HEAD_OID" \
            --arg headline "$HEADLINE" \
            --argjson additions "$ADDITIONS" \
            '{
              query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: "logonoff/homebrew-bucket", branchName: "main" },
                  expectedHeadOid: $oid,
                  message: { headline: $headline },
                  fileChanges: { additions: $additions }
                }
              }
            }' | gh api graphql --input -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
