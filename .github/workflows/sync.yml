name: Sync Manifests

on:
  repository_dispatch:
    types: [sync]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download manifests
        run: |
          jq -c '.[]' apps.json | while read -r entry; do
            url=$(echo "$entry" | jq -r '.pullFrom')
            dest=$(echo "$entry" | jq -r '.downloadTo')
            mkdir -p "$(dirname "$dest")"
            curl -fsSL "$url" -o "$dest"
            echo "Downloaded $url → $dest"
          done

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          changed_files=$(git diff --name-only)
          num_changed=$(echo "$changed_files" | wc -l)

          for file in $changed_files; do
            name=$(basename "${file%.*}")
            dir=$(dirname "$file")
            if [[ "$file" == *.rb ]]; then
              ver=$(grep -m1 'version "' "$file" | sed 's/.*version "\(.*\)"/\1/')
            elif [[ "$file" == *.json ]]; then
              ver=$(jq -r '.version' "$file")
            fi

            pkg_type=""
            if [[ "$num_changed" -gt 1 ]]; then
              case "$dir" in
                Casks)   pkg_type=" (Homebrew Cask)" ;;
                Formula) pkg_type=" (Homebrew)" ;;
                bucket)  pkg_type=" (Scoop)" ;;
              esac
            fi

            if [[ -n "$ver" ]]; then
              HEADLINE="$name: Update to version ${ver}${pkg_type}"
            else
              HEADLINE="$name: Update${pkg_type}"
            fi

            content=$(base64 -w0 < "$file")
            ADDITIONS=$(printf '{"path":"%s","contents":"%s"}' "$file" "$content" | jq -s '.')

            HEAD_OID=$(gh api graphql \
              -f query='{ repository(owner:"logonoff", name:"homebrew-bucket") {
                ref(qualifiedName:"refs/heads/main") { target { oid } }
              }}' --jq '.data.repository.ref.target.oid')

            jq -n \
              --arg oid "$HEAD_OID" \
              --arg headline "$HEADLINE" \
              --argjson additions "$ADDITIONS" \
              '{
                query: "mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { oid } } }",
                variables: {
                  input: {
                    branch: { repositoryNameWithOwner: "logonoff/homebrew-bucket", branchName: "main" },
                    expectedHeadOid: $oid,
                    message: { headline: $headline },
                    fileChanges: { additions: $additions }
                  }
                }
              }' | gh api graphql --input -
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
